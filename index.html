<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communitrail – Inscripcions Curses de Muntanya</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#eeeeec;color:#1a1a1a;min-height:100vh}
.btn-green{background:#16a34a;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;display:inline-block}
.btn-green:hover{background:#15803d}
.btn-green:disabled{background:#86efac;cursor:not-allowed}
.btn-outline{background:#fff;color:#16a34a;border:2px solid #16a34a;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-block}
.btn-outline:hover{background:#f0fdf4}
.btn-ghost{background:none;border:none;color:#374151;cursor:pointer;font-size:14px;padding:4px 0}
.btn-ghost:hover{color:#16a34a}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;transition:border 0.2s;background:#fff;font-family:inherit}
input:focus,select:focus{border-color:#16a34a;box-shadow:0 0 0 3px #dcfce7}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.badge-extreme{background:#fee2e2;color:#991b1b}
.badge-difficult{background:#fef3c7;color:#92400e}
.badge-moderate{background:#d1fae5;color:#065f46}
/* NAV fluid */
nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 clamp(20px,4vw,80px);height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;flex-shrink:0}
.logo-text{font-family:'Poppins',sans-serif;font-weight:800;font-size:20px;color:#1a4a2e;letter-spacing:-0.3px}
.nav-links{display:flex;gap:24px;align-items:center}
/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden}
.race-card{cursor:pointer;transition:transform 0.18s,box-shadow 0.18s}
.race-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,0.12)}
.stat-number{font-size:30px;font-weight:800;color:#16a34a}
.stat-label{font-size:13px;color:#6b7280;margin-top:4px}
/* FOOTER fluid */
footer{background:#111827;color:#9ca3af;padding:56px clamp(20px,4vw,80px) 32px}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;max-width:1400px;margin:0 auto}
.footer-link{display:block;color:#9ca3af;font-size:13px;margin-bottom:10px;cursor:pointer;transition:color 0.15s}
.footer-link:hover{color:#fff}
/* FORMS */
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.progress-bar{height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:4px}
.tab{padding:11px 18px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;color:#6b7280;transition:all 0.2s}
.tab.active{color:#16a34a;border-bottom-color:#16a34a;font-weight:600}
.success-circle{width:80px;height:80px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;border:3px solid #bbf7d0}
.pay-method{border:2px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;background:#fff;transition:all 0.2s}
.pay-method.selected{border-color:#16a34a;background:#f0fdf4}
/* CONTENIDOR PRINCIPAL: fluid fins a 1400px, padding proporcional */
.section-max{max-width:1400px;margin:0 auto;padding:0 clamp(20px,4vw,80px)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.alert-error{background:#fef2f2;color:#dc2626;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;border-left:3px solid #dc2626}
/* GRAELLA CURSES: auto-fill, mínim 300px per targeta */
.races-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
/* LAYOUT FILTRES + GRAELLA */
.filter-layout{display:grid;grid-template-columns:280px 1fr;gap:32px;align-items:start}
@media(min-width:1400px){.filter-layout{grid-template-columns:300px 1fr}}
@media(max-width:860px){.filter-layout{grid-template-columns:1fr}}
@media(max-width:600px){.races-grid{grid-template-columns:1fr}.footer-inner{grid-template-columns:1fr 1fr}}
@media(max-width:420px){.footer-inner{grid-template-columns:1fr}}
/* HAMBURGER MENU */
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;border-radius:6px}
.hamburger span{display:block;width:24px;height:2px;background:#1a4a2e;border-radius:2px;transition:all 0.28s ease}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{position:fixed;top:64px;left:0;right:0;bottom:0;background:#fff;z-index:99;padding:24px clamp(20px,4vw,40px);display:flex;flex-direction:column;gap:6px;transform:translateY(-110%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);overflow-y:auto}
.mobile-menu.open{transform:translateY(0)}
.mobile-menu-overlay{position:fixed;inset:0;top:64px;background:rgba(0,0,0,0.4);z-index:98;opacity:0;pointer-events:none;transition:opacity 0.3s}
.mobile-menu-overlay.open{opacity:1;pointer-events:all}
.mob-link{display:block;padding:14px 0;font-size:16px;font-weight:600;color:#1a1a1a;border-bottom:1px solid #f3f4f6;background:none;border-left:none;border-right:none;border-top:none;cursor:pointer;text-align:left;font-family:'Poppins',sans-serif;transition:color 0.15s}
.mob-link:hover{color:#16a34a}
/* FILTER POPUP MOBILE */
.filter-popup-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s}
.filter-popup-backdrop.open{opacity:1;pointer-events:all}
.filter-popup{position:fixed;bottom:0;left:0;right:0;background:#fff;z-index:201;border-radius:20px 20px 0 0;padding:0 20px 32px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1)}
.filter-popup.open{transform:translateY(0)}
.filter-popup-handle{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:14px auto 20px}
/* Hide desktop nav on mobile, show hamburger */
@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .hamburger-solo{display:none !important}
  .mobile-nav-right{display:flex !important}
  .filter-sidebar{display:none !important}
  .filter-layout{grid-template-columns:1fr !important}
  .mobile-filter-btn{display:flex !important}
  .races-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .noticia-destacada{grid-template-columns:1fr !important}
  .payment-grid{grid-template-columns:1fr !important}
  .contact-grid{grid-template-columns:1fr !important}
  .profile-stats-4{grid-template-columns:repeat(2,1fr) !important}
  /* Race page 3-col → 1-col on mobile */
  .race-3col{grid-template-columns:1fr !important}
  .race-3col > div:first-child{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .race-stats-bar{grid-template-columns:repeat(3,1fr) !important}
  .race-gallery{grid-template-columns:1fr 1fr !important}
}
@media(min-width:769px){
  .hamburger{display:none}
  .mobile-nav-right{display:none !important}
}
</style>

const MAX_PREU = 150;

  const [categoria, setCategoria] = useState('Totes');
  const [preuMax, setPreuMax] = useState(MAX_PREU);
  const [dificultats, setDificultats] = useState({fàcil:true, mitja:true, tècnica:true});

  const toggleDif = d => setDificultats(prev => ({...prev, [d]: !prev[d]}));

  const filteredRaces = races.filter(r => {
    if (r.estat !== 'publicada') return false;
    const matchNom = r.name.toLowerCase().includes(cerca.toLowerCase()) ||
                     r.ubicacio.toLowerCase().includes(cerca.toLowerCase());
    const matchCat = categoria === 'Totes' || r.categoria === categoria;
    const matchPreu = r.preu <= preuMax;
    const matchDif = dificultats[r.dificultat];
    return matchNom && matchCat && matchPreu && matchDif;
  });

  const resetFiltres = () => {
    setCerca(''); setCategoria('Totes'); setPreuMax(MAX_PREU);
    setDificultats({fàcil:true, mitja:true, tècnica:true});

  const anyFilterActive = cerca !== '' || categoria !== 'Totes' || preuMax < MAX_PREU ||
    !dificultats.fàcil || !dificultats.mitja || !dificultats.tècnica;

            <span style={{
              fontSize:13,fontWeight:600,padding:'3px 12px',borderRadius:20,

          </label>

            Veure {filteredRaces.length} cursa{filteredRaces.length!==1?'es':''}

        </div>
      )}
      {/* Resum desktop */}

        <div style={{marginTop:8,paddingTop:16,borderTop:'1px solid #e5e7eb',textAlign:'center',fontSize:13,color:'#6b7280'}}>
          <span style={{fontWeight:700,color:'#16a34a',fontSize:15}}>{filteredRaces.length}</span> cursa{filteredRaces.length!==1?'es':''} trobada{filteredRaces.length!==1?'es':''}
        </div>
      )}
    </>
  );

  return (
  <div>
    {/* Hero */}
    <div style={{position:'relative',height:'clamp(520px,55vw,720px)',overflow:'hidden'}}>
      <img
        src="https://images.unsplash.com/photo-1551632811-561732d1e306?w=1600&q=85"
        alt="Corredors de muntanya"
        style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 30%'}}
      />
      <div style={{position:'absolute',inset:0,background:'linear-gradient(105deg, rgba(3,30,15,0.97) 0%, rgba(5,46,22,0.92) 28%, rgba(10,60,30,0.62) 55%, rgba(10,40,20,0.15) 100%)'}}/>
      <div style={{position:'absolute',inset:0,background:'rgba(22,101,52,0.22)'}}/>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center'}}>
        <div className="section-max" style={{width:'100%'}}>
          <div style={{maxWidth:'clamp(480px, 45%, 660px)'}}>

                onMouseOut={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,0.35)';e.currentTarget.style.background='none'}}
                onClick={() => setPage('signup')}>
                Crear compte gratis
              </button>
            </div>
            <div style={{display:'flex',gap:36,paddingTop:28,borderTop:'1px solid rgba(255,255,255,0.15)'}}>
              {[{n:'150+',l:'Curses anuals'},{n:'25K+',l:'Corredors'},{n:'95%',l:'Satisfacció'},{n:'10',l:'Comunitats'}].map(s => (
                <div key={s.l}>
                  <div style={{fontSize:22,fontWeight:800,color:'#4ade80'}}>{s.n}</div>
                  <div style={{fontSize:12,color:'rgba(255,255,255,0.6)',marginTop:3,letterSpacing:'0.3px'}}>{s.l}</div>
                </div>

            </div>
          </div>
        </div>
      </div>
    </div>

/* SVG perfil d'elevació simulat */
const ElevationProfile = ({distancia, desnivell}) => {
  const w = 500, h = 100;
  // Generate a realistic-ish elevation curve based on race params
  const pts = [];
  const segments = 20;
  let elevation = 200;
  const maxEl = h - 10;
  const seed = distancia * 7 + desnivell;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    // Pseudo-random but deterministic wave
    const noise = Math.sin(t * 5.3 + seed * 0.01) * 0.3 +
                  Math.sin(t * 12.1 + seed * 0.02) * 0.15 +
                  Math.sin(t * 2.7 + seed * 0.005) * 0.4;
    // Main elevation shape: up in middle, down at end
    const main = Math.sin(t * Math.PI) * 0.7 + noise * 0.3;
    elevation = 10 + (maxEl - 10) * Math.max(0, Math.min(1, 0.15 + main * 0.85));
    pts.push([Math.round((i / segments) * w), Math.round(h - elevation)]);
  }
  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0]},${p[1]}`).join(' ');
  const fillD = `${pathD} L${w},${h} L0,${h} Z`;
  // Key points for labels
  const maxPt = pts.reduce((a,b) => a[1] < b[1] ? a : b);
  return (
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height:100,display:'block'}}>
        <defs>
          <linearGradient id="elev-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#16a34a" stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#16a34a" stopOpacity="0.05"/>
          </linearGradient>
        </defs>
        <path d={fillD} fill="url(#elev-grad)"/>
        <path d={pathD} fill="none" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {/* Max point dot */}
        <circle cx={maxPt[0]} cy={maxPt[1]} r="4" fill="#16a34a"/>
        <text x={maxPt[0]} y={maxPt[1]-8} fontSize="9" fill="#16a34a" fontWeight="700" textAnchor="middle">+{desnivell.toLocaleString()}m</text>
        {/* X axis labels */}
        {[0, 0.25, 0.5, 0.75, 1].map(t => (
          <text key={t} x={t*w} y={h-1} fontSize="8" fill="#9ca3af" textAnchor="middle">{Math.round(t*distancia)}km</text>
        ))}
      </svg>
    </div>
  );
};

const SignUp = ({setPage, setUser}) => {
  const [form, setForm] = useState({name:'',email:'',phone:'',password:'',password2:'',terms:false});
  const [err, setErr] = useState('');
  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const submit = () => {
    setErr('');
    if (!form.name || !form.email || !form.password) { setErr("Omple tots els camps obligatoris (*)."); return; }
    if (form.password !== form.password2) { setErr("Les contrasenyes no coincideixen."); return; }
    if (form.password.length < 6) { setErr("La contrasenya ha de tenir mínim 6 caràcters."); return; }
    if (!form.terms) { setErr("Has d'acceptar els termes i condicions per continuar."); return; }
    const user = {
      name: form.name, email: form.email, phone: form.phone,
      password: form.password, since: 'Abril 2026', registrations: []
    };
    localStorage.setItem('ct_user', JSON.stringify(user));
    setUser(user);
    setPage('home');
  };

  return (
    <div style={{minHeight:'80vh',display:'flex',flexDirection:'column'}}>
      <div style={{flex:1,background:'#f0fdf4',display:'flex',alignItems:'center',justifyContent:'center',padding:'48px 24px'}}>

const PaymentPage = ({race, user, setPage, setUser, setCurrentRegistration}) => {
  const [payMethod, setPayMethod] = useState('card');
  const [card, setCard] = useState({number:'',expiry:'',cvv:'',holder:''});
  const [tshirt, setTshirt] = useState('M');
  const [emergency, setEmergency] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [confirmed, setConfirmed] = useState(false);

  if (!race || !user) return null;
  const setC = (k, v) => setCard(c => ({...c, [k]: v}));
  const fmtCard = v => v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();
  const fmtExpiry = v => { const d = v.replace(/\D/g,'').slice(0,4); return d.length > 2 ? d.slice(0,2)+'/'+d.slice(2) : d; };

  const pay = () => {
    setErr('');
    if (payMethod === 'card') {
      if (card.number.replace(/\s/g,'').length < 16) { setErr("Introdueix un número de targeta vàlid (16 dígits)."); return; }
      if (card.expiry.length < 5) { setErr("Introdueix una data de caducitat vàlida (MM/AA)."); return; }
      if (card.cvv.length < 3) { setErr("El CVV ha de tenir 3 o 4 dígits."); return; }
      if (!card.holder.trim()) { setErr("Introdueix el nom del titular de la targeta."); return; }
    }
    setLoading(true);
    setTimeout(() => {
      const reg = {raceId:race.id, date:race.date, tshirt, paid:race.preu, completed:false};
      const updated = {...user, registrations: [...(user.registrations||[]), reg]};
      localStorage.setItem('ct_user', JSON.stringify(updated));
      setUser(updated);
      setLoading(false);
      setConfirmed(true);
    }, 2000);
  };

  const payMethods = [
    {id:'card',   label:'Targeta de crèdit/dèbit', icon:'💳'},
    {id:'paypal', label:'PayPal',                  icon:'🅿'},

  return (
    <>

/* ── VISTA ORGANITZADOR: Formulari proposta cursa ── */
const FormulariProposta = ({afegirCursa, goView}) => {
  const [sent, setSent] = useState(false);
  const [form, setForm] = useState({
    name:'', location:'', date:'', distancia:'', desnivell:'', preu:'',
    dificultat:'fàcil', categoria:'Trail', ubicacio:'', description:''
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const enviar = () => {
    if (!form.name || !form.location || !form.date || !form.distancia || !form.preu) return;
    afegirCursa({
      name:form.name, location:form.location, date:form.date,
      distancia:Number(form.distancia), desnivell:Number(form.desnivell)||0,
      preu:Number(form.preu), dificultat:form.dificultat, categoria:form.categoria,
      ubicacio:form.ubicacio, description:form.description,
      spots:200, emoji:'🏔️', color:'#16a34a', gradient:'#14532d,#16a34a',
      includes:['Dorsal i xip','Medalla'], schedule:[]
    });
    setSent(true);
  };

  if (sent) return (
    <div style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'48px 24px'}}>
      <div className="card" style={{padding:48,textAlign:'center',maxWidth:460}}>

        <p style={{color:'#6b7280',marginBottom:28,lineHeight:1.6}}>La teva cursa s'ha enviat a revisió. L'equip admin la revisarà i la publicarà en breu.</p>
        <div style={{display:'flex',gap:12,justifyContent:'center'}}>
          <button className="btn-green" onClick={() => { setSent(false); setForm({name:'',location:'',date:'',distancia:'',desnivell:'',preu:'',dificultat:'fàcil',categoria:'Trail',ubicacio:'',description:''}); }}>
            Crear una altra
          </button>
          <button className="btn-outline" onClick={() => goView('home')}>Tornar a l'inici</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'70vh',padding:'52px 0 64px'}}>
      <div className="section-max">
        <div style={{marginBottom:32}}>
          <span style={{display:'inline-block',background:ROLS.organitzador.bg,color:ROLS.organitzador.color,fontSize:11,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',padding:'5px 14px',borderRadius:20,marginBottom:14,border:`1px solid ${ROLS.organitzador.color}33`}}>

        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:28,alignItems:'start'}}>
          <div className="card" style={{padding:32}}>
            <h2 style={{fontSize:16,fontWeight:700,marginBottom:22}}>Informació de la cursa</h2>
            <div className="input-group"><label>Nom de la cursa *</label><input placeholder="Ex: Ultra Trail dels Pirineus" value={form.name} onChange={e=>set('name',e.target.value)}/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <div className="input-group"><label>Localització *</label><input placeholder="Poble, Província" value={form.location} onChange={e=>set('location',e.target.value)}/></div>

            <div className="input-group"><label>Data de celebració *</label><input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></div>

          {filtered.length === 0 && (
            <div style={{textAlign:'center',padding:'64px 24px',color:'#6b7280'}}>
              <div style={{fontSize:48,marginBottom:16}}>🏔️</div>
              <p style={{fontSize:16,fontWeight:500}}>No s'han trobat curses amb aquests criteris.</p>
            </div>
          )}
        </div>
      </div>
      <Footer setPage={setPage}/>
    </div>
  );
};

/* ── PÀGINA NOTÍCIES ── */
const NoticiesPage = ({setPage}) => {
  const [selected, setSelected] = useState(null);

  if (selected) return (
    <div style={{minHeight:'80vh',display:'flex',flexDirection:'column'}}>
      <div style={{flex:1,padding:'32px 0 64px'}}>
        <div className="section-max" style={{maxWidth:780}}>
          <button className="btn-ghost" style={{color:'#6b7280',display:'flex',alignItems:'center',gap:6,marginBottom:28}} onClick={() => { setSelected(null); scrollTop(); }}>
            ← Tornar a notícies
          </button>
          <span style={{display:'inline-block',background:'#f0fdf4',color:'#16a34a',fontSize:11,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',padding:'5px 14px',borderRadius:20,marginBottom:16,border:'1px solid #bbf7d0'}}>
            {selected.categoria}
          </span>
          <h1 style={{fontSize:28,fontWeight:800,marginBottom:12,lineHeight:1.3}}>{selected.titol}</h1>
          <div style={{fontSize:13,color:'#9ca3af',marginBottom:28}}>📅 {selected.data} · Font: {selected.font}</div>
          <div style={{height:380,borderRadius:16,overflow:'hidden',marginBottom:32}}>
            <img src={selected.img} alt={selected.titol} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          </div>
          <div style={{fontSize:16,color:'#374151',lineHeight:1.85,whiteSpace:'pre-line'}}>{selected.text}</div>
        </div>
      </div>
      <Footer setPage={setPage}/>
    </div>
  );

  return (
    <div style={{minHeight:'80vh',display:'flex',flexDirection:'column'}}>
      <div style={{flex:1,padding:'52px 0 64px'}}>
        <div className="section-max">
          <div style={{marginBottom:40}}>
            <span style={{display:'inline-block',background:'#f0fdf4',color:'#16a34a',fontSize:11,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',padding:'5px 14px',borderRadius:20,marginBottom:16,border:'1px solid #bbf7d0'}}>
              Notícies
            </span>
            <h1 style={{fontSize:34,fontWeight:800,marginBottom:8}}>Actualitat del trail running</h1>
            <p style={{color:'#6b7280',fontSize:15}}>Les últimes notícies, resultats i reportatges del món de les curses de muntanya</p>
          </div>

          {/* Notícia destacada */}
          <div className="card" style={{marginBottom:32,cursor:'pointer',overflow:'hidden',display:'grid',gridTemplateColumns:'1fr 1fr'}}
            onClick={() => { setSelected(NOTICIES[0]); scrollTop(); }}>
            <div style={{height:320,overflow:'hidden'}}>
              <img src={NOTICIES[0].img} alt={NOTICIES[0].titol} style={{width:'100%',height:'100%',objectFit:'cover',transition:'transform 0.4s'}}
                onMouseOver={e=>e.style.transform='scale(1.04)'}
                onMouseOut={e=>e.style.transform='scale(1)'}/>
            </div>
            <div style={{padding:32,display:'flex',flexDirection:'column',justifyContent:'center'}}>
              <span style={{display:'inline-block',background:'#16a34a',color:'#fff',fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:20,marginBottom:14,textTransform:'uppercase'}}>{NOTICIES[0].categoria} · Destacat</span>
              <h2 style={{fontSize:20,fontWeight:800,marginBottom:12,lineHeight:1.3}}>{NOTICIES[0].titol}</h2>
              <p style={{fontSize:14,color:'#6b7280',lineHeight:1.7,marginBottom:16}}>{NOTICIES[0].resum}</p>
              <div style={{fontSize:12,color:'#9ca3af'}}>{NOTICIES[0].data}</div>
            </div>
          </div>

          {/* Resta de notícies */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:22}}>
            {NOTICIES.slice(1).map(n => (
              <div key={n.id} className="card" style={{cursor:'pointer',transition:'transform 0.18s,box-shadow 0.18s'}}
                onMouseOver={e=>e.currentTarget.style.transform='translateY(-3px)'}
                onMouseOut={e=>e.currentTarget.style.transform='none'}
                onClick={() => { setSelected(n); scrollTop(); }}>
                <div style={{height:200,overflow:'hidden',position:'relative'}}>
                  <img src={n.img} alt={n.titol} style={{width:'100%',height:'100%',objectFit:'cover',transition:'transform 0.4s'}}
                    onMouseOver={e=>e.style.transform='scale(1.06)'}
                    onMouseOut={e=>e.style.transform='scale(1)'}/>
                  <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,0.35),transparent 60%)'}}/>
                  <span style={{position:'absolute',top:12,left:12,background:'#16a34a',color:'#fff',fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:20,textTransform:'uppercase'}}>{n.categoria}</span>
                </div>
                <div style={{padding:'18px'}}>
                  <h3 style={{fontSize:14,fontWeight:700,marginBottom:8,lineHeight:1.4}}>{n.titol}</h3>
                  <p style={{fontSize:12,color:'#6b7280',lineHeight:1.6,marginBottom:10,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{n.resum}</p>
                  <div style={{fontSize:11,color:'#9ca3af'}}>{n.data} · {n.font}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <Footer setPage={setPage}/>
    </div>
  );
};

/* ── APP PRINCIPAL ── */
const App = () => {
  const [page, setPage] = useState('home');
  const [view, setView] = useState('home'); // vista dins la SPA (home/inscripcions/admin-panel/formulari-proposta/contacte)
  const [user, setUser] = useState(() => {
    try {
      const s = localStorage.getItem('ct_user');
      if (!s) return null;
      const u = JSON.parse(s);
      // Si l'usuari no té rol vàlid (sessió antiga), el descartem
      if (!u.rol || !ROLS[u.rol]) { localStorage.removeItem('ct_user'); return null; }
      return u;
    } catch { return null; }
  });
  const [selectedRace, setSelectedRace] = useState(null);
  const [currentRegistration, setCurrentRegistration] = useState(null);
  // Curses amb estat (publicada / pendent)
  const [races, setRaces] = useState(() =>
    RACES.map(r => ({...r, estat: 'publicada'}))
  );

  const syncUser = u => {
    setUser(u);
    if (u) localStorage.setItem('ct_user', JSON.stringify(u));
  };

  const loginCom = (rol) => {
    const u = {...USERS_SIMULATS[rol]};
    syncUser(u);
    setView('home');
    setPage('home');
  };

  const logout = () => {
    localStorage.removeItem('ct_user');
    setUser(null);
    setView('home');
    setPage('home');
  };

  const aprovarCursa = (id) => {
    setRaces(prev => prev.map(r => r.id === id ? {...r, estat:'publicada'} : r));
  };

  const afegirCursa = (nova) => {
    setRaces(prev => [...prev, {...nova, id: Date.now(), estat:'pendent', taken:0, img:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80'}]);
  };

  // Navega a una vista SPA i reseteja page a home
  const goView = (v) => { setView(v); setPage('home'); scrollTop(); };
  const navPage = (p) => { setPage(p); scrollTop(); };

  // Pàgines que sobreescriuen la vista SPA (fitxa cursa, pagament, etc.)
  const isOverlay = ['race','signin','signup','payment','confirmation','profile'].includes(page);

  return (
    <div>
      <Nav
        page={page} setPage={setPage}
        user={user} setUser={syncUser}
        logout={logout} loginCom={loginCom}
        view={view} setView={goView}
      />

      {/* ── ROLE SWITCHER (dev helper) ── */}
      {!isOverlay && (
        <div style={{background:'#1a1a1a',padding:'6px clamp(20px,4vw,80px)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:'#6b7280',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.8px'}}>Test ràpid:</span>
          {Object.entries(ROLS).map(([rol,info]) => (
            <button key={rol} onClick={() => loginCom(rol)} style={{
              background: user?.rol===rol ? info.bg : 'transparent',
              color: user?.rol===rol ? info.color : '#9ca3af',
              border:`1px solid ${user?.rol===rol ? info.color : '#374151'}`,
              borderRadius:20, padding:'3px 12px', fontSize:11, fontWeight:700,
              cursor:'pointer', transition:'all 0.2s'
            }}>
              {info.icon} {info.label}
            </button>
          ))}
          {user && (
            <button onClick={logout} style={{background:'transparent',color:'#6b7280',border:'1px solid #374151',borderRadius:20,padding:'3px 12px',fontSize:11,fontWeight:600,cursor:'pointer',marginLeft:'auto'}}>
              ✕ Tancar sessió
            </button>
          )}
        </div>
      )}

      {/* ── OVERLAYS (pàgines que cobreixen la SPA) ── */}
      {page === 'race'         && <RacePage race={selectedRace} setPage={navPage} user={user} setCurrentRegistration={setCurrentRegistration}/>}
      {page === 'signin'       && <SignIn setPage={navPage} setUser={syncUser} loginCom={loginCom}/>}
      {page === 'signup'       && <SignUp setPage={navPage} setUser={syncUser}/>}
      {page === 'profile'      && <ProfilePage user={user} setUser={syncUser} setPage={navPage} setSelectedRace={setSelectedRace}/>}
      {page === 'payment'      && <PaymentPage race={currentRegistration||selectedRace} user={user} setPage={navPage} setUser={syncUser} setCurrentRegistration={setCurrentRegistration}/>}

      {/* ── VISTES SPA (només si no hi ha overlay) ── */}
      {!isOverlay && (
        <>
          {view === 'home'               && <HomePage setPage={navPage} setSelectedRace={setSelectedRace} races={races} goView={goView}/>}
          {view === 'contacte'           && <ContactePage setPage={navPage}/>}
          {view === 'noticies'           && <NoticiesPage setPage={navPage}/>}
          {view === 'arxiu'              && <ArxiuPage setPage={navPage}/>}
          {view === 'inscripcions'       && <InscripcionsView user={user} setPage={navPage} setSelectedRace={setSelectedRace}/>}
          {view === 'admin-panel'        && <AdminView races={races} aprovarCursa={aprovarCursa}/>}
          {view === 'formulari-proposta' && <FormulariProposta afegirCursa={afegirCursa} goView={goView}/>}
          {view === 'curses-organitzador' && <CursesOrganitzador races={races} user={user} goView={goView}/>}
        </>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
